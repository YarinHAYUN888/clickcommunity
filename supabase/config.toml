# OTP send happens before any user session exists — gateway must allow anon invoke
[functions.registration-webhook]
verify_jwt = false

# OTP webhook invoke also happens pre-auth from onboarding
[functions.send-otp-webhook]
verify_jwt = false

# Onboarding user is not signed in yet; function uses service role internally
[functions.complete-registration]
verify_jwt = false

# Authenticated members only; same default as other JWT-backed functions
[functions.record-profile-swipe]
verify_jwt = true

[functions.analyze-profile-personality]
verify_jwt = true

[functions.compute-compatibility]
verify_jwt = true